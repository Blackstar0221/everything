<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="auth-card">
      <h1 id="formTitle">User Log In</h1>
      <p class="subtitle" id="subtitle">Welcome back 👋</p>

      <div class="top-toggles-wrap">
        <div class="top-toggles">
          <button id="userModeBtn" class="mode-btn active" type="button">User</button>
          <button id="adminModeBtn" class="mode-btn" type="button">Admin</button>
        </div>
      </div>

      <form id="authForm">
        <div id="signupFields" class="hidden">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Choose a username"
          />
        </div>

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required
        />

        <button type="submit" id="submitBtn">Log In</button>
      </form>

      <p id="message" class="message"></p>

      <p class="switch-text" id="switchText">
        <span id="switchPrompt">Don't have an account?</span>
        <button id="toggleMode" class="link-btn" type="button">Create Account</button>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
